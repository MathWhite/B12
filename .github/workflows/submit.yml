import json
import hmac
import hashlib
import os
from datetime import datetime, timezone

import requests

SIGNING_SECRET = "hello-there-from-b12"

payload = {
    "action_run_link": os.environ["ACTION_RUN_LINK"],
    "email": "you@example.com",
    "name": "Your Name",
    "repository_link": "https://github.com/your-user/b12-application",
    "resume_link": "https://linkedin.com/in/your-profile",
    "timestamp": datetime.now(timezone.utc)
        .isoformat(timespec="milliseconds")
        .replace("+00:00", "Z"),
}

# Canonical JSON:
# - compact separators
# - sorted keys
# - UTF-8 encoded
body = json.dumps(
    payload,
    separators=(",", ":"),
    sort_keys=True,
    ensure_ascii=False,
).encode("utf-8")

signature = hmac.new(
    SIGNING_SECRET.encode("utf-8"),
    body,
    hashlib.sha256,
).hexdigest()

headers = {
    "Content-Type": "application/json",
    "X-Signature-256": f"sha256={signature}",
}

response = requests.post(
    "https://b12.io/apply/submission",
    data=body,
    headers=headers,
    timeout=30,
)

response.raise_for_status()

data = response.json()

print("Submission successful!")
print("Receipt:", data["receipt"])